<!DOCTYPE html>
<html dir='rtl' lang='ar'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'>
<title>LAVNDR120</title>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<script src='https://accounts.google.com/gsi/client' async defer></script>
<style>
  body { background: #0a0a0f; color: #fff; font-family: sans-serif; margin: 0; }
  #loginOverlay { position: fixed; inset: 0; background: #0a0a0f; display: flex; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; }
  .logo { font-size: 32px; font-weight: 900; background: linear-gradient(135deg,#C9A84C,#F0D080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  #mainWrap { display: none; padding: 20px; }
  #loadingWrap { text-align: center; padding: 50px; }
</style>
</head>
<body>

<div id='loginOverlay'>
  <div class='logo'>LAVNDR120</div>
  <div id='g_id_onload' data-client_id='938319363791-0l0hj9ji67v9avmlnhq1vt8hiuqmp2lt.apps.googleusercontent.com' data-callback='handleGoogleLogin'></div>
  <div class='g_id_signin' data-type='standard'></div>
  <div id='loginMsg' style='color:#888; margin-top:15px;'></div>
</div>

<div id='loadingWrap' style='display:none;'>جاري التحميل...</div>
<div id='mainWrap'></div>

<script>
const ALLOWED_EMAILS = ['imspractice69@gmail.com'];
const CF_WORKER = 'https://lavndr120-proxy.imspractice69.workers.dev';
let globalData = null;

window.handleGoogleLogin = function(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email = payload.email.toLowerCase();
  
  if (!ALLOWED_EMAILS.includes(email)) {
    document.getElementById('loginMsg').innerHTML = '<span style="color:red">غير مصرح لك بالدخول</span>';
    return;
  }

  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('loadingWrap').style.display = 'block';

  fetch(CF_WORKER + '/data')
    .then(res => res.json())
    .then(data => {
      globalData = data;
      document.getElementById('loadingWrap').style.display = 'none';
      document.getElementById('mainWrap').style.display = 'block';
      document.getElementById('mainWrap').innerText = 'تم الاتصال بنجاح. البيانات: ' + data.indexTicker;
    })
    .catch(err => {
      document.getElementById('loadingWrap').innerText = 'خطأ في جلب البيانات: ' + err.message;
    });
};
</script>
</body>
</html>
