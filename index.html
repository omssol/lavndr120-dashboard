<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LAVNDR120</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0f;min-height:100vh;display:flex;align-items:center;
       justify-content:center;font-family:sans-serif;}
  .card{text-align:center;padding:40px 24px;}
  .logo{font-size:32px;font-weight:900;letter-spacing:2px;
        background:linear-gradient(135deg,#C9A84C,#F0D080);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:4px;}
  .spinner{border:3px solid #222;border-top:3px solid #C9A84C;border-radius:50%;
           width:32px;height:32px;animation:spin 1s linear infinite;
           margin:32px auto;display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{color:#888;font-size:13px;margin-top:16px;}
  #loginArea{margin-top:40px;display:flex;justify-content:center;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">LAVNDR120</div>
  <div class="sub">المؤشر الاستهلاكي</div>
  <div class="spinner" id="spinner"></div>
  <div id="loginArea">
    <div id="g_id_onload"
         data-client_id="938319363791-0l0hj9ji67v9avmlnhq1vt8hiuqmp2lt.apps.googleusercontent.com"
         data-callback="handleCredential"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="signin_with"
         data-shape="rectangular"
         data-logo_alignment="left">
    </div>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script>
const ALLOWED  = ['imspractice69@gmail.com'];
const GAS      = 'https://script.google.com/macros/s/AKfycbyobmc4t4AfUWiTahBYD8VpFSMbjcrfpQFaQ2AzoeAiixXgK16AkXPvvKjp6Li3vjZO2Q/exec';
const GAS_KEY  = 'LAVNDR_SECRET_KEY_2026';
const T_KEY    = 'lv_token';
const E_KEY    = 'lv_email';

function showSpinner(v) {
  document.getElementById('spinner').style.display   = v ? 'block' : 'none';
  document.getElementById('loginArea').style.display = v ? 'none'  : 'block';
}
function showMsg(t) { document.getElementById('msg').textContent = t; }

function showDenied() {
  document.body.innerHTML =
    '<div style="text-align:center;padding:60px 20px;font-family:sans-serif;">' +
    '<div style="font-size:28px;font-weight:900;color:#C9A84C;">LAVNDR120</div>' +
    '<div style="font-size:48px;margin:24px;opacity:0.3;">🔒</div>' +
    '<div style="color:#555;font-size:14px;">هذا النظام مخصص للمشاركين المسجلين فقط</div>' +
    '</div>';
}

// تحقق من جلسة محفوظة
const savedToken = sessionStorage.getItem(T_KEY);
const savedEmail = sessionStorage.getItem(E_KEY);
if (savedToken && savedEmail) {
  showSpinner(true);
  loadDashboard(savedToken, savedEmail);
}

// callback من Google Identity Services
function handleCredential(response) {
  const credential = response.credential;
  const payload = JSON.parse(atob(credential.split('.')[1]));
  const email   = payload.email.toLowerCase();

  if (!ALLOWED.includes(email)) {
    showDenied();
    return;
  }

  showSpinner(true);
  showMsg('جاري التحقق من الصلاحيات...');

  // تحقق محلي — بدون أي سيرفر
  if (!ALLOWED.includes(email)) {
    showDenied();
    return;
  }
  const token = credential; // استخدم Google JWT مباشرة
  sessionStorage.setItem(T_KEY, token);
  sessionStorage.setItem(E_KEY, email);
  loadDashboard(token, email);
}

async function loadDashboard(token, email) {
  showSpinner(true);
  showMsg('جاري تحميل البيانات...');
  try {
    const url  = RENDER + '/proxy/data';
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error && data.code === 401) {
      sessionStorage.clear();
      showSpinner(false);
      showMsg('انتهت الجلسة — سجل الدخول مجدداً');
      return;
    }
    window.AUTH_TOKEN   = token;
    window.USER_EMAIL   = email;
    window.INITIAL_DATA = data;
    const r    = await fetch('dashboard.html');
    const html = await r.text();
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    showSpinner(false);
    showMsg('فشل تحميل البيانات');
  }
}
</script>
</body>
</html>
