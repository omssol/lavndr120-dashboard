<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LAVNDR120</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0f;min-height:100vh;display:flex;align-items:center;
       justify-content:center;font-family:sans-serif;}
  .card{text-align:center;padding:40px 24px;}
  .logo{font-size:32px;font-weight:900;letter-spacing:2px;
        background:linear-gradient(135deg,#C9A84C,#F0D080);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:4px;}
  .btn{margin-top:40px;padding:14px 32px;background:#C9A84C;color:#000;
       border:none;border-radius:12px;font-size:15px;font-weight:700;
       cursor:pointer;width:100%;max-width:280px;display:block;margin:40px auto 0;}
  .spinner{border:3px solid #222;border-top:3px solid #C9A84C;border-radius:50%;
           width:32px;height:32px;animation:spin 1s linear infinite;
           margin:32px auto;display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{color:#888;font-size:13px;margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">LAVNDR120</div>
  <div class="sub">المؤشر الاستهلاكي</div>
  <div class="spinner" id="spinner"></div>
  <div id="loginArea">
    <button class="btn" id="loginBtn" onclick="signIn()">تسجيل الدخول بـ Google</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth,
  signInWithRedirect,
  getRedirectResult,
  GoogleAuthProvider,
  onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDR538OyW6eSoc8Dq3A50VQmOCEkNLzRIw",
  authDomain: "lavndr120.onrender.com",
  projectId: "lavndr120",
  storageBucket: "lavndr120.firebasestorage.app",
  messagingSenderId: "938319363791",
  appId: "1:938319363791:web:ab581bd34b161e843201ba"
};

const app      = initializeApp(firebaseConfig);

// إبقاء Render مستيقظاً
fetch('https://lavndr120.onrender.com/ping').catch(()=>{});
setInterval(() => fetch('https://lavndr120.onrender.com/ping').catch(()=>{}), 600000);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({prompt: 'select_account'});

const GAS     = 'https://script.google.com/macros/s/AKfycbzBRV8YVp445VgKRX0QUPbGeVyz0hxLkmiHk0c2TqtWXuERtCJt-EYlahZwef94QbyVcw/exec';
const GAS_KEY = 'LAVNDR_SECRET_KEY_2026';
const RENDER  = 'https://lavndr120.onrender.com';
const T_KEY   = 'lv_token';
const E_KEY   = 'lv_email';

function showSpinner(v) {
  document.getElementById('spinner').style.display    = v ? 'block' : 'none';
  document.getElementById('loginArea').style.display  = v ? 'none'  : 'block';
}
function showMsg(t) { document.getElementById('msg').textContent = t; }

// تحقق من جلسة محفوظة
const savedToken = sessionStorage.getItem(T_KEY);
const savedEmail = sessionStorage.getItem(E_KEY);
if (savedToken && savedEmail) {
  showSpinner(true);
  showMsg('جاري التحميل...');
  loadDashboard(savedToken, savedEmail);
} else {
  // تحقق من redirect result
  showSpinner(true);
  showMsg('جاري التحقق...');
  getRedirectResult(auth)
    .then(async result => {
      if (result && result.user) {
        await handleUser(result.user);
      } else {
        showSpinner(false);
        showMsg('');
      }
    })
    .catch(e => {
      showSpinner(false);
      showMsg('');
    });
}

async function handleUser(user) {
  showMsg('جاري التحقق من الصلاحيات...');
  try {
    const idToken = await user.getIdToken();
    // أيقظ Render أولاً
    try { await fetch(RENDER + '/ping'); } catch(e) {}
    await new Promise(r => setTimeout(r, 2000));
    const res = await fetch(RENDER + '/auth/firebase', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id_token: idToken})
    });
    const data = await res.json();
    if (data.error) {
      showSpinner(false);
      showMsg('غير مصرح لك بالدخول 🔒');
      await auth.signOut();
      return;
    }
    sessionStorage.setItem(T_KEY, data.token);
    sessionStorage.setItem(E_KEY, user.email.toLowerCase());
    loadDashboard(data.token, user.email.toLowerCase());
  } catch(e) {
    showSpinner(false);
    showMsg('فشل الاتصال — حاول مجدداً');
    await auth.signOut();
  }
}

window.signIn = async function() {
  try {
    document.getElementById('loginBtn').disabled = true;
    showMsg('جاري التوجيه لـ Google...');
    await signInWithRedirect(auth, provider);
  } catch(e) {
    showMsg('فشل — حاول مجدداً');
    document.getElementById('loginBtn').disabled = false;
  }
};

async function loadDashboard(token, email) {
  showMsg('جاري تحميل البيانات...');
  try {
    const url = GAS + '?key=' + GAS_KEY + '&action=data&token=' + encodeURIComponent(token);
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) {
      if (data.code === 401) {
        sessionStorage.clear();
        showSpinner(false);
        showMsg('انتهت الجلسة — سجل الدخول مجدداً');
        return;
      }
      throw new Error(data.error);
    }
    window.AUTH_TOKEN   = token;
    window.USER_EMAIL   = email;
    window.INITIAL_DATA = data;
    const r   = await fetch('dashboard.html');
    const html = await r.text();
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    showSpinner(false);
    showMsg('فشل تحميل البيانات — ' + e.message);
  }
}
</script>
</body>
</html>
