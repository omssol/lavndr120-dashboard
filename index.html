<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LAVNDR120</title>
<style>
 body { background:#0a0a0f; display:flex; align-items:center;
         justify-content:center; min-height:100vh; margin:0; }
 .logo { text-align:center; color:#C9A84C; font-size:28px;
          font-weight:900; letter-spacing:2px; font-family:sans-serif; }
 .sub  { color:#555; font-size:11px; letter-spacing:3px;
          text-align:center; margin-top:6px; font-family:sans-serif; }
 .spinner { border:3px solid #222; border-top:3px solid #C9A84C;
             border-radius:50%; width:32px; height:32px;
             animation:spin 1s linear infinite; margin:24px auto; }
 @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div>
 <div class="logo">LAVNDR120</div>
 <div class="sub">المؤشر الاستهلاكي</div>
 <div class="spinner"></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw8Cpi6W9FGY-DID6jsFhHpF5i6eoR9bb3rRGNnib0LSG7WgC7zn-qFphZTZJkGGyGu8A/exec';
const AUTH_KEY = 'lavndr_token';
const EMAIL_KEY = 'lavndr_email';

// التحقق من توكن محفوظ
const savedToken = sessionStorage.getItem(AUTH_KEY);
const savedEmail = sessionStorage.getItem(EMAIL_KEY);

if (savedToken && savedEmail) {
 // توكن موجود — تحقق منه مع GAS
 verifyAndLoad(savedToken, savedEmail);
} else {
 // لا توكن — افتح GAS للمصادقة
 openAuthPopup();
}

function openAuthPopup() {
 const popup = window.open(
   GAS_URL + '?mode=token',
   'GAS_AUTH',
   'width=500,height=600,scrollbars=yes'
 );

 // استمع للرسالة من GAS popup
 window.addEventListener('message', function(e) {
   if (e.data && e.data.token && e.data.email) {
     sessionStorage.setItem(AUTH_KEY, e.data.token);
     sessionStorage.setItem(EMAIL_KEY, e.data.email);
     if (popup) popup.close();
     verifyAndLoad(e.data.token, e.data.email);
   } else if (e.data && e.data.denied) {
     showDenied();
   }
 }, false);
}

function verifyAndLoad(token, email) {
 // اجلب البيانات من GAS مع التوكن
 fetch(GAS_URL + '?key=LAVNDR_SECRET_KEY_2026&action=data&token=' + encodeURIComponent(token))
   .then(r => r.json())
   .then(data => {
     if (data.error && data.code === 401) {
       sessionStorage.clear();
       openAuthPopup();
       return;
     }
     // ابن الداشبورد
     loadDashboard(token, email, data);
   })
   .catch(() => { document.body.innerHTML = '<div style="color:#F43F5E;text-align:center;padding:40px;">فشل الاتصال</div>'; });
}

function showDenied() {
 document.body.innerHTML = `
   <div style="text-align:center;font-family:sans-serif;">
     <div style="color:#C9A84C;font-size:28px;font-weight:900;">LAVNDR120</div>
     <div style="color:#555;font-size:48px;margin:24px;">🔒</div>
     <div style="color:#444;font-size:14px;">هذا النظام مخصص للمشاركين المسجلين فقط</div>
   </div>`;
}

function loadDashboard(token, email, data) {
 // هنا يُحمَّل dashboard.html المحلي مع البيانات
 // سنضع الداشبورد الكامل في ملف منفصل
 window.AUTH_TOKEN = token;
 window.USER_EMAIL = email;
 window.INITIAL_DATA = data;

 // تحميل الداشبورد
 fetch('dashboard.html')
   .then(r => r.text())
   .then(html => {
     document.open();
     document.write(html);
     document.close();
   });
}
</script>
</body>
</html>
